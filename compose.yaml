services:
  
  nginx:
    image: nginx:alpine
    container_name: quiz-nginx
    ports:
      - "9310:80"
    volumes:
      - type: bind
        source: ./public
        target: /var/www/public
      - type: bind
        source: ./nginx.conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - php


  php:
    image: php:8.4-fpm-alpine
    container_name: quiz-php
    user: "1000:1000"
    volumes:
      - type: bind
        source: ./public
        target: /var/www/public
      - type: bind
        source: ./src
        target: /var/www/src
      - type: bind
        source: ./vendor
        target: /var/www/vendor
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: quiz-mysql
    ports:
      - "3366:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quiz
      MYSQL_USER: jeml
      MYSQL_PASSWORD: pass
    volumes:
      - type: volume
        source: quiz_db
        target: /var/lib/mysql
      - type: bind
        source: ./init.sql
        target: /docker-entrypoint-initdb.d/init.sql

volumes:
  quiz_db: