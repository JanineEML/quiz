services:
  
  nginx:
    image: nginx:alpine
    container_name: quiz-nginx
    ports:
      - "9310:80"
    volumes:
      - type: bind
        source: ./public
        target: /var/www/public
      - type: bind
        source: ./nginx-default.conf
        target: /etc/nginx/conf.d/default.conf

  php:
    image: php:8.4-fpm
    container_name: quiz-php
    user: "1000:1000"
    volumes:
      - type: bind
        source: ./public
        target: /var/www/public
      - type: bind
        source: ./src
        target: /var/www/src
      - type: bind
        source: ./vendor
        target: /var/www/vendor

  mysql:
    image: mysql:latest
    container_name: quiz-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quiz
      MYSQL_USER: jeml
      MYSQL_PASSWORD: pass
    volumes:
      - type: bind
        source: ./mysql/data
        target: /var/lib/mysql
    ports:
      - "3366:3306"